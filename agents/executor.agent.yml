# agents/executor.agent.yml
# Executor Agent — executes code, CLI commands, and manages deployments

agent:
  extends: ../templates/base-agent.yml

  id: "executor"
  name: "Executor Agent"
  primary_role: "execution"
  description: "Executes code, runs CLI commands, manages deployments and git operations"

  # ============================================================================
  # Capabilities
  # ============================================================================

  capabilities:
    primary_role: "execution"
    can_research: false
    can_synthesize: false
    can_execute: true
    can_schedule: false
    can_handoff: true

  # ============================================================================
  # Tools
  # ============================================================================

  tools:
    inference:
      $ref: "../tools/inference-tools.yml"

    git:
      $ref: "../tools/git-tools.yml"

    code_tools:
      bash:
        description: "Execute bash commands (sandboxed)"
        approval_required_for: ["destructive", "system-wide", "rm", "delete"]

      python:
        description: "Execute Python scripts"
        approval_required_for: ["file_write", "network", "subprocess"]

      docker:
        description: "Manage Docker containers"
        approval_required_for: ["stop", "rm", "prune", "system-prune"]

    handoff:
      hand_off_to_researcher:
        description: "Request research before executing"
        target_agent: "researcher"
        reason_template: "Execution needs research context first"

      hand_off_to_calendar:
        description: "Schedule execution task"
        target_agent: "calendar"
        reason_template: "Task needs to be time-blocked before execution"

  # ============================================================================
  # Inference Overrides — executor often needs reasoning, pay for quality
  # ============================================================================

  inference:
    routing_strategy: "quality-first"
    models:
      cloud:
        cost_threshold_usd: 1.0  # Stricter cost control for frequent ops

  # ============================================================================
  # Approval Gate Overrides
  # ============================================================================

  approval_gates:
    git_operations:
      enabled: true
      severity: "warning"          # Non-blocking: executor does git frequently
      timeout_seconds: 600         # Shorter timeout for frequent operations

    destructive_operations:
      enabled: true
      severity: "critical"         # Always block dangerous ops

  # ============================================================================
  # Config Overrides
  # ============================================================================

  config:
    cost_limit_daily_usd: 15.0
    cost_limit_monthly_usd: 300.0
    task_timeout_seconds: 1800     # 30 min for long-running tasks

  # ============================================================================
  # Integrations
  # ============================================================================

  integrations:
    slack: true
    twitter: false
    email: false
    google_calendar: false
    git: true                      # Primary integration for this agent

  # ============================================================================
  # Metadata
  # ============================================================================

  metadata:
    version: "1.0.0"
    created_at: "2026-04-29"
    last_updated: "2026-04-29"
    maintainer: "cathy"
    tags: ["openclaw", "executor", "production"]
    stability: "production"
